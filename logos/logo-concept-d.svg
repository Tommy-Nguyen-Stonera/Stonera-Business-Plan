  <!-- S with angular terminals -->
  <path d="M18 12 L10 20 L10 22 C10 14, 18 8, 28 8 L42 8 C52 8, 58 13, 58 20 C58 27, 52 30, 42 30 L24 30 C14 30, 8 35, 8 42 C8 49, 16 54, 28 54 L44 54 C50 54, 54 52, 56 48 L56 42 L48 50" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- T with angular cuts -->
  <path d="M68 8 L104 8 M86 8 L86 46 L78 54" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="square"/>

  <!-- O -->
  <path d="M130 8 L150 8 C162 8, 168 18, 168 28 C168 38, 162 48, 150 48 L130 48 C118 48, 112 38, 112 28 C112 18, 118 8, 130 8 Z" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linejoin="miter"/>

  <!-- N with angular terminals -->
  <path d="M186 54 L178 46 L178 8 L210 48 L210 8 L218 16" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- E with angular cuts -->
  <path d="M254 48 L228 48 L228 8 L254 8 M228 28 L248 28" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="square"/>

  <!-- R with angular terminals -->
  <path d="M266 48 L266 8 L286 8 C296 8, 302 14, 302 20 C302 26, 296 30, 286 30 L266 30 M284 30 L304 48 L312 40" fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="square"/>

  <!-- A with angular terminals -->
